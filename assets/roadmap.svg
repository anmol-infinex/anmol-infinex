<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="roadBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04080f"/>
      <stop offset="100%" style="stop-color:#060310"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#bd00ff"/>
      <stop offset="100%" style="stop-color:#00ff66"/>
    </linearGradient>
    <pattern id="dotGrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.6" fill="rgba(0,240,255,0.12)"/>
    </pattern>
    <linearGradient id="doneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff66"/>
      <stop offset="100%" style="stop-color:#00b347"/>
    </linearGradient>
    <linearGradient id="activeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#0080aa"/>
    </linearGradient>
    <linearGradient id="nextGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bd00ff"/>
      <stop offset="100%" style="stop-color:#6600aa"/>
    </linearGradient>
    <linearGradient id="futureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2233"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="url(#roadBg)" rx="10"/>
  <rect width="900" height="260" fill="url(#dotGrid)" rx="10"/>

  <!-- Title -->
  <text x="450" y="38" font-family="'Courier New', monospace" font-size="15" font-weight="700"
        fill="url(#lineGrad)" text-anchor="middle" letter-spacing="5" filter="url(#glow)">
    ◈ TARGET TIMELINE / MISSION ◈
  </text>

  <!-- Timeline connector line -->
  <line x1="60" y1="130" x2="840" y2="130" stroke="url(#lineGrad)" stroke-width="2" opacity="0.4"/>

  <!-- === NODE 1: DONE === -->
  <!-- Glow ring -->
  <circle cx="110" cy="130" r="28" fill="rgba(0,255,102,0.1)" filter="url(#softGlow)"/>
  <circle cx="110" cy="130" r="22" fill="url(#doneGrad)" stroke="#00ff66" stroke-width="2.5"/>
  <text x="110" y="127" font-family="Courier New" font-size="11" fill="#000" text-anchor="middle" font-weight="900">✓</text>
  <text x="110" y="139" font-family="Courier New" font-size="7" fill="#000" text-anchor="middle">DONE</text>
  <!-- Label -->
  <rect x="60" y="168" width="100" height="38" rx="6" fill="rgba(0,255,102,0.08)" stroke="#00ff66" stroke-width="1" opacity="0.9"/>
  <text x="110" y="183" font-family="Courier New" font-size="8.5" fill="#00ff66" text-anchor="middle" font-weight="700">FOUNDATIONS</text>
  <text x="110" y="196" font-family="Courier New" font-size="7.5" fill="#8b949e" text-anchor="middle">Python · Linux</text>
  <text x="110" y="207" font-family="Courier New" font-size="7.5" fill="#8b949e" text-anchor="middle">Networking</text>
  <!-- Status dot -->
  <circle cx="110" cy="56" r="4" fill="#00ff66" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="110" y="50" font-family="Courier New" font-size="7" fill="#00ff66" text-anchor="middle">2024</text>

  <!-- Connector -->
  <line x1="132" y1="130" x2="218" y2="130" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- === NODE 2: DONE === -->
  <circle cx="240" cy="130" r="28" fill="rgba(0,255,102,0.1)" filter="url(#softGlow)"/>
  <circle cx="240" cy="130" r="22" fill="url(#doneGrad)" stroke="#00ff66" stroke-width="2.5"/>
  <text x="240" y="127" font-family="Courier New" font-size="11" fill="#000" text-anchor="middle" font-weight="900">✓</text>
  <text x="240" y="139" font-family="Courier New" font-size="7" fill="#000" text-anchor="middle">DONE</text>
  <rect x="190" y="168" width="100" height="38" rx="6" fill="rgba(0,255,102,0.08)" stroke="#00ff66" stroke-width="1" opacity="0.9"/>
  <text x="240" y="183" font-family="Courier New" font-size="8.5" fill="#00ff66" text-anchor="middle" font-weight="700">CYBER TOOLS</text>
  <text x="240" y="196" font-family="Courier New" font-size="7.5" fill="#8b949e" text-anchor="middle">Kali · Nmap</text>
  <text x="240" y="207" font-family="Courier New" font-size="7.5" fill="#8b949e" text-anchor="middle">Burp · Wireshark</text>
  <text x="240" y="50" font-family="Courier New" font-size="7" fill="#00ff66" text-anchor="middle">2024</text>

  <!-- Connector -->
  <line x1="262" y1="130" x2="348" y2="130" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- === NODE 3: ACTIVE === -->
  <circle cx="370" cy="130" r="32" fill="rgba(0,240,255,0.15)" filter="url(#softGlow)">
    <animate attributeName="r" values="32;38;32" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="130" r="25" fill="url(#activeGrad)" stroke="#00f0ff" stroke-width="3" filter="url(#glow)"/>
  <text x="370" y="126" font-family="Courier New" font-size="9" fill="#000" text-anchor="middle" font-weight="900">⚡</text>
  <text x="370" y="138" font-family="Courier New" font-size="7" fill="#000" text-anchor="middle">ACTIVE</text>
  <rect x="315" y="168" width="110" height="38" rx="6" fill="rgba(0,240,255,0.12)" stroke="#00f0ff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="370" y="183" font-family="Courier New" font-size="8.5" fill="#00f0ff" text-anchor="middle" font-weight="700">AI SECURITY</text>
  <text x="370" y="196" font-family="Courier New" font-size="7.5" fill="#8b949e" text-anchor="middle">PyRIT · Garak</text>
  <text x="370" y="207" font-family="Courier New" font-size="7.5" fill="#8b949e" text-anchor="middle">LLM Testing</text>
  <circle cx="370" cy="56" r="5" fill="#00f0ff" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="370" y="50" font-family="Courier New" font-size="7" fill="#00f0ff" text-anchor="middle">NOW →</text>

  <!-- Connector -->
  <line x1="395" y1="130" x2="475" y2="130" stroke="#bd00ff" stroke-width="2" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- === NODE 4: NEXT === -->
  <circle cx="500" cy="130" r="28" fill="rgba(189,0,255,0.1)" filter="url(#softGlow)"/>
  <circle cx="500" cy="130" r="22" fill="url(#nextGrad)" stroke="#bd00ff" stroke-width="2.5"/>
  <text x="500" y="127" font-family="Courier New" font-size="11" fill="#fff" text-anchor="middle">→</text>
  <text x="500" y="139" font-family="Courier New" font-size="7" fill="#fff" text-anchor="middle">NEXT</text>
  <rect x="448" y="168" width="104" height="38" rx="6" fill="rgba(189,0,255,0.08)" stroke="#bd00ff" stroke-width="1" opacity="0.9"/>
  <text x="500" y="183" font-family="Courier New" font-size="8.5" fill="#bd00ff" text-anchor="middle" font-weight="700">SOC ANALYST</text>
  <text x="500" y="196" font-family="Courier New" font-size="7.5" fill="#8b949e" text-anchor="middle">Splunk · Wazuh</text>
  <text x="500" y="207" font-family="Courier New" font-size="7.5" fill="#8b949e" text-anchor="middle">ELK · TheHive</text>
  <text x="500" y="50" font-family="Courier New" font-size="7" fill="#bd00ff" text-anchor="middle">2025 Q1</text>

  <!-- Connector -->
  <line x1="522" y1="130" x2="608" y2="130" stroke="#bd00ff" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.35"/>

  <!-- === NODE 5: FUTURE === -->
  <circle cx="630" cy="130" r="22" fill="url(#futureGrad)" stroke="#3a4560" stroke-width="2"/>
  <text x="630" y="127" font-family="Courier New" font-size="11" fill="#3a4560" text-anchor="middle">◎</text>
  <text x="630" y="139" font-family="Courier New" font-size="7" fill="#3a4560" text-anchor="middle">FUTURE</text>
  <rect x="578" y="168" width="104" height="38" rx="6" fill="rgba(30,40,70,0.4)" stroke="#3a4560" stroke-width="1" opacity="0.8"/>
  <text x="630" y="183" font-family="Courier New" font-size="8.5" fill="#3a4560" text-anchor="middle" font-weight="700">CERT &amp; CERTS</text>
  <text x="630" y="196" font-family="Courier New" font-size="7.5" fill="#3a4560" text-anchor="middle">CEH · OSCP</text>
  <text x="630" y="207" font-family="Courier New" font-size="7.5" fill="#3a4560" text-anchor="middle">CompTIA+</text>
  <text x="630" y="50" font-family="Courier New" font-size="7" fill="#3a4560" text-anchor="middle">2025 Q3</text>

  <!-- Connector -->
  <line x1="652" y1="130" x2="738" y2="130" stroke="#3a4560" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.3"/>

  <!-- === NODE 6: FUTURE === -->
  <circle cx="760" cy="130" r="22" fill="url(#futureGrad)" stroke="#3a4560" stroke-width="2"/>
  <text x="760" y="127" font-family="Courier New" font-size="11" fill="#3a4560" text-anchor="middle">◎</text>
  <text x="760" y="139" font-family="Courier New" font-size="7" fill="#3a4560" text-anchor="middle">FUTURE</text>
  <rect x="706" y="168" width="108" height="38" rx="6" fill="rgba(30,40,70,0.4)" stroke="#3a4560" stroke-width="1" opacity="0.8"/>
  <text x="760" y="183" font-family="Courier New" font-size="8.5" fill="#3a4560" text-anchor="middle" font-weight="700">AI SEC ANALYST</text>
  <text x="760" y="196" font-family="Courier New" font-size="7.5" fill="#3a4560" text-anchor="middle">Full-Time Role</text>
  <text x="760" y="207" font-family="Courier New" font-size="7.5" fill="#3a4560" text-anchor="middle">AI Red Teaming</text>
  <text x="760" y="50" font-family="Courier New" font-size="7" fill="#3a4560" text-anchor="middle">2026</text>

  <!-- Border -->
  <rect width="900" height="260" fill="none" stroke="#1a2233" stroke-width="1.5" rx="10"/>
</svg>
