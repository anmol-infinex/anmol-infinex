<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Removed external font import to avoid blocked external requests when embedding */
      .header-text {
        /* prefer Inter if available, otherwise use system fallbacks */
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 48px;
        font-weight: 700;
        letter-spacing: 0.05em;
        fill: url(#gradientText);
      }
      
      .subtitle-text {
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.1em;
        fill: #00d4ff;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(20px); }
      }
      
      @keyframes glow-pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      
      @keyframes rotate-clockwise {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes rotate-counter {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
      
      .orb-group {
        animation: float 4s ease-in-out infinite;
      }
      
      .glow {
        animation: glow-pulse 3s ease-in-out infinite;
      }
      
      .rotate-ring-1 {
        animation: rotate-clockwise 20s linear infinite;
      }
      
      .rotate-ring-2 {
        animation: rotate-counter 15s linear infinite;
      }
    </style>
    
    <linearGradient id="gradientText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="orbGradient" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.15" />
    </radialGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.3" flood-color="#00d4ff"/>
    </filter>

    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#0B1023"/>
  
  <!-- Grid pattern (semitransparent overlay) -->
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- Animated background blobs -->
  <g opacity="0.05">
    <circle cx="200" cy="150" r="300" fill="#00d4ff" class="glow"/>
    <circle cx="900" cy="600" r="350" fill="#a855f7" class="glow"/>
    <circle cx="1100" cy="200" r="280" fill="#ec4899" class="glow"/>
  </g>
  
  <!-- Header Section -->
  <text x="600" y="80" text-anchor="middle" class="header-text">CERTIFICATIONS BY</text>
  
  <!-- Decorative underline -->
  <line x1="475" y1="110" x2="725" y2="110" stroke="url(#gradientText)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Logo Orbs Grid -->
  <!-- AWS Logo Orb -->
  <g class="orb-group">
    <circle cx="150" cy="350" r="90" fill="url(#orbGradient)" filter="url(#shadow)"/>
    <circle cx="150" cy="350" r="88" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" class="rotate-ring-1"/>
    <circle cx="150" cy="350" r="82" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.4" class="rotate-ring-2"/>
    <!-- Inner shine -->
    <circle cx="150" cy="350" r="70" fill="url(#orbGradient)" opacity="0.3"/>
    <!-- AWS Logo placeholder -->
    <rect x="120" y="320" width="60" height="60" fill="white" opacity="0.1" rx="4"/>
    <text x="150" y="360" text-anchor="middle" dominant-baseline="middle" font-size="20" fill="#00d4ff" font-weight="bold">AWS</text>
  </g>
  
  <!-- Deloitte Logo Orb -->
  <g class="orb-group" style="animation-delay: 0.3s">
    <circle cx="420" cy="350" r="90" fill="url(#orbGradient)" filter="url(#shadow)"/>
    <circle cx="420" cy="350" r="88" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6" class="rotate-ring-1"/>
    <circle cx="420" cy="350" r="82" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4" class="rotate-ring-2"/>
    <circle cx="420" cy="350" r="70" fill="url(#orbGradient)" opacity="0.3"/>
    <rect x="390" y="320" width="60" height="60" fill="white" opacity="0.1" rx="4"/>
    <text x="420" y="360" text-anchor="middle" dominant-baseline="middle" font-size="18" fill="#a855f7" font-weight="bold">DT</text>
  </g>
  
  <!-- Tata Logo Orb -->
  <g class="orb-group" style="animation-delay: 0.6s">
    <circle cx="690" cy="350" r="90" fill="url(#orbGradient)" filter="url(#shadow)"/>
    <circle cx="690" cy="350" r="88" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6" class="rotate-ring-1"/>
    <circle cx="690" cy="350" r="82" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4" class="rotate-ring-2"/>
    <circle cx="690" cy="350" r="70" fill="url(#orbGradient)" opacity="0.3"/>
    <rect x="660" y="320" width="60" height="60" fill="white" opacity="0.1" rx="4"/>
    <text x="690" y="360" text-anchor="middle" dominant-baseline="middle" font-size="18" fill="#ec4899" font-weight="bold">TG</text>
  </g>
  
  <!-- InAmigos Logo Orb -->
  <g class="orb-group" style="animation-delay: 0.9s">
    <circle cx="960" cy="350" r="90" fill="url(#orbGradient)" filter="url(#shadow)"/>
    <circle cx="960" cy="350" r="88" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6" class="rotate-ring-1"/>
    <circle cx="960" cy="350" r="82" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.4" class="rotate-ring-2"/>
    <circle cx="960" cy="350" r="70" fill="url(#orbGradient)" opacity="0.3"/>
    <rect x="930" y="320" width="60" height="60" fill="white" opacity="0.1" rx="4"/>
    <text x="960" y="360" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#00d4ff" font-weight="bold">IA</text>
  </g>
  
  <!-- CDMI Logo Orb -->
  <g class="orb-group" style="animation-delay: 1.2s">
    <circle cx="285" cy="550" r="90" fill="url(#orbGradient)" filter="url(#shadow)"/>
    <circle cx="285" cy="550" r="88" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6" class="rotate-ring-1"/>
    <circle cx="285" cy="550" r="82" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4" class="rotate-ring-2"/>
    <circle cx="285" cy="550" r="70" fill="url(#orbGradient)" opacity="0.3"/>
    <rect x="255" y="520" width="60" height="60" fill="white" opacity="0.1" rx="4"/>
    <text x="285" y="560" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#a855f7" font-weight="bold">CDMI</text>
  </g>
  
  <!-- Parul University Logo Orb -->
  <g class="orb-group" style="animation-delay: 1.5s">
    <circle cx="825" cy="550" r="90" fill="url(#orbGradient)" filter="url(#shadow)"/>
    <circle cx="825" cy="550" r="88" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6" class="rotate-ring-1"/>
    <circle cx="825" cy="550" r="82" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4" class="rotate-ring-2"/>
    <circle cx="825" cy="550" r="70" fill="url(#orbGradient)" opacity="0.3"/>
    <rect x="795" y="520" width="60" height="60" fill="white" opacity="0.1" rx="4"/>
    <text x="825" y="560" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#ec4899" font-weight="bold">PU</text>
  </g>
  
  <!-- Footer text -->
  <g>
    <line x1="300" y1="700" x2="400" y2="700" stroke="url(#gradientText)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <text x="600" y="705" text-anchor="middle" class="subtitle-text">TRUSTED &amp; CERTIFIED</text>
    <line x1="800" y1="700" x2="900" y2="700" stroke="url(#gradientText)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
