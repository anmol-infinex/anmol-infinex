<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- ═══ 3D BACKGROUND GRADIENT ═══ -->
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="75%">
      <stop offset="0%" style="stop-color:#0b081c"/>
      <stop offset="50%" style="stop-color:#05030e"/>
      <stop offset="100%" style="stop-color:#020106"/>
    </radialGradient>

    <!-- ═══ GLOW FILTERS ═══ -->
    <filter id="megaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b1"/>
      <feGaussianBlur stdDeviation="10" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ═══ 3D DROP SHADOWS ═══ -->
    <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- ═══ GRADIENTS FOR PATHS AND NODES ═══ -->
    <linearGradient id="mainPathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff66"/>
      <stop offset="50%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#bd00ff"/>
    </linearGradient>

    <!-- Done Node (Green) -->
    <radialGradient id="doneGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#33ff88"/>
      <stop offset="70%" style="stop-color:#00cc55"/>
      <stop offset="100%" style="stop-color:#008833"/>
    </radialGradient>

    <!-- Active Node (Cyan) -->
    <radialGradient id="activeGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#66f5ff"/>
      <stop offset="70%" style="stop-color:#00bacc"/>
      <stop offset="100%" style="stop-color:#007788"/>
    </radialGradient>

    <!-- Next Node (Purple) -->
    <radialGradient id="nextGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#d466ff"/>
      <stop offset="70%" style="stop-color:#9900cc"/>
      <stop offset="100%" style="stop-color:#660088"/>
    </radialGradient>

    <!-- Future Node (Dark) -->
    <radialGradient id="futureGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#2a3655"/>
      <stop offset="70%" style="stop-color:#151b2b"/>
      <stop offset="100%" style="stop-color:#0a0d15"/>
    </radialGradient>

    <!-- Card Backgrounds -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.05)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.01)"/>
    </linearGradient>

    <!-- ═══ GRID PATTERN ═══ -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,240,255,0.03)" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="rgba(0,240,255,0.1)"/>
    </pattern>
  </defs>

  <!-- ═══════════════════ BACKGROUND ═══════════════════ -->
  <rect width="900" height="320" fill="url(#bgRadial)" rx="12"/>
  
  <!-- Perspective Grid (Fake 3D floor) -->
  <g opacity="0.3">
    <path d="M 0,220 L 900,220 M 0,240 L 900,240 M 0,270 L 900,270 M 0,310 L 900,310" stroke="#00f0ff" stroke-width="0.5" fill="none"/>
    <path d="M 450,150 L 50,320 M 450,150 L 250,320 M 450,150 L 450,320 M 450,150 L 650,320 M 450,150 L 850,320" stroke="#00f0ff" stroke-width="0.5" fill="none"/>
  </g>

  <!-- Title -->
  <g transform="translate(450, 45)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-size="16" font-weight="900"
          fill="#ffffff" text-anchor="middle" letter-spacing="6" filter="url(#softGlow)">
      ◈ TARGET TIMELINE / MISSION ◈
    </text>
    <!-- Title Underline Glow -->
    <line x1="-150" y1="12" x2="150" y2="12" stroke="url(#mainPathGrad)" stroke-width="2" filter="url(#megaGlow)"/>
  </g>

  <!-- ═══════════════════ 3D TIMELINE PATH ═══════════════════ -->
  <!-- Base shadow path -->
  <path d="M 80,150 L 820,150" stroke="#000" stroke-width="8" opacity="0.5" filter="url(#softGlow)"/>
  <!-- Main glowing path -->
  <path d="M 80,145 L 820,145" stroke="url(#mainPathGrad)" stroke-width="4" filter="url(#megaGlow)"/>
  <!-- Core bright path -->
  <path d="M 80,145 L 820,145" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>

  <!-- Animated data packets traveling along the line -->
  <circle cx="0" cy="145" r="3" fill="#ffffff" filter="url(#softGlow)">
    <animate attributeName="cx" values="80;820" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.1;0.9;1"/>
  </circle>

  <!-- ═══════════════════ NODES & CARDS ═══════════════════ -->

  <!-- === NODE 1: FOUNDATIONS (DONE) === -->
  <g transform="translate(120, 145)">
    <!-- Node -->
    <circle cx="0" cy="0" r="24" fill="url(#doneGrad)" filter="url(#nodeShadow)"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#00ff66" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00ff66" stroke-width="0.5" filter="url(#megaGlow)" opacity="0.5"/>
    <text x="0" y="5" font-family="Arial" font-size="14" fill="#000" text-anchor="middle" font-weight="900">✓</text>
    
    <!-- Info Card (Bottom) -->
    <g transform="translate(0, 45)">
      <rect x="-55" y="0" width="110" height="55" rx="8" fill="url(#cardGrad)" stroke="rgba(0,255,102,0.3)" stroke-width="1" filter="url(#nodeShadow)"/>
      <rect x="-55" y="0" width="110" height="4" fill="#00ff66" opacity="0.8" rx="2"/>
      <text x="0" y="20" font-family="'Courier New', monospace" font-size="9" fill="#00ff66" text-anchor="middle" font-weight="700">FOUNDATIONS</text>
      <text x="0" y="35" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a1a1aa" text-anchor="middle">Python · Linux</text>
      <text x="0" y="47" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a1a1aa" text-anchor="middle">Networking</text>
    </g>
    
    <!-- Year -->
    <text x="0" y="-35" font-family="'Courier New', monospace" font-size="10" fill="#00ff66" text-anchor="middle" font-weight="700" filter="url(#softGlow)">2024</text>
  </g>

  <!-- === NODE 2: CYBER TOOLS (DONE) === -->
  <g transform="translate(260, 145)">
    <!-- Node -->
    <circle cx="0" cy="0" r="24" fill="url(#doneGrad)" filter="url(#nodeShadow)"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#00ff66" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00ff66" stroke-width="0.5" filter="url(#megaGlow)" opacity="0.5"/>
    <text x="0" y="5" font-family="Arial" font-size="14" fill="#000" text-anchor="middle" font-weight="900">✓</text>
    
    <!-- Info Card (Top) -->
    <g transform="translate(0, -95)">
      <rect x="-55" y="0" width="110" height="55" rx="8" fill="url(#cardGrad)" stroke="rgba(0,255,102,0.3)" stroke-width="1" filter="url(#nodeShadow)"/>
      <rect x="-55" y="51" width="110" height="4" fill="#00ff66" opacity="0.8" rx="2"/>
      <text x="0" y="20" font-family="'Courier New', monospace" font-size="9" fill="#00ff66" text-anchor="middle" font-weight="700">CYBER TOOLS</text>
      <text x="0" y="35" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a1a1aa" text-anchor="middle">Kali · Nmap</text>
      <text x="0" y="47" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a1a1aa" text-anchor="middle">Burp · Wireshark</text>
    </g>
    
    <!-- Year -->
    <text x="0" y="35" font-family="'Courier New', monospace" font-size="10" fill="#00ff66" text-anchor="middle" font-weight="700" filter="url(#softGlow)">2024</text>
  </g>

  <!-- === NODE 3: AI SECURITY (ACTIVE) === -->
  <g transform="translate(400, 145)">
    <!-- Pulsing Aura -->
    <circle cx="0" cy="0" r="35" fill="rgba(0,240,255,0.15)" filter="url(#megaGlow)">
      <animate attributeName="r" values="30;45;30" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Node -->
    <circle cx="0" cy="0" r="28" fill="url(#activeGrad)" filter="url(#nodeShadow)"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="0" y="4" font-family="Arial" font-size="14" fill="#000" text-anchor="middle" font-weight="900">⚡</text>
    
    <!-- Info Card (Bottom - Larger for emphasis) -->
    <g transform="translate(0, 45)">
      <rect x="-65" y="0" width="130" height="60" rx="8" fill="rgba(0,240,255,0.05)" stroke="#00f0ff" stroke-width="1.5" filter="url(#nodeShadow)"/>
      <rect x="-65" y="0" width="130" height="4" fill="#00f0ff" opacity="0.9" rx="2"/>
      <text x="0" y="22" font-family="'Courier New', monospace" font-size="10" fill="#00f0ff" text-anchor="middle" font-weight="900" filter="url(#softGlow)">AI SECURITY</text>
      <text x="0" y="38" font-family="'Segoe UI', sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">PyRIT · Garak</text>
      <text x="0" y="51" font-family="'Segoe UI', sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">LLM Pentesting</text>
    </g>
    
    <!-- Year -->
    <text x="0" y="-38" font-family="'Courier New', monospace" font-size="11" fill="#00f0ff" text-anchor="middle" font-weight="900" filter="url(#megaGlow)">NOW</text>
  </g>

  <!-- === NODE 4: SOC ANALYST (NEXT) === -->
  <g transform="translate(540, 145)">
    <!-- Node -->
    <circle cx="0" cy="0" r="24" fill="url(#nextGrad)" filter="url(#nodeShadow)"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#bd00ff" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#bd00ff" stroke-width="0.5" filter="url(#megaGlow)" opacity="0.5"/>
    <text x="0" y="4" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="900">→</text>
    
    <!-- Info Card (Top) -->
    <g transform="translate(0, -95)">
      <rect x="-55" y="0" width="110" height="55" rx="8" fill="url(#cardGrad)" stroke="rgba(189,0,255,0.3)" stroke-width="1" filter="url(#nodeShadow)"/>
      <rect x="-55" y="51" width="110" height="4" fill="#bd00ff" opacity="0.8" rx="2"/>
      <text x="0" y="20" font-family="'Courier New', monospace" font-size="9" fill="#bd00ff" text-anchor="middle" font-weight="700">SOC ANALYST</text>
      <text x="0" y="35" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a1a1aa" text-anchor="middle">Splunk · Wazuh</text>
      <text x="0" y="47" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a1a1aa" text-anchor="middle">ELK · TheHive</text>
    </g>
    
    <!-- Year -->
    <text x="0" y="35" font-family="'Courier New', monospace" font-size="10" fill="#bd00ff" text-anchor="middle" font-weight="700" filter="url(#softGlow)">2025 Q1</text>
  </g>

  <!-- === NODE 5: CERTIFICATIONS (FUTURE) === -->
  <g transform="translate(680, 145)">
    <!-- Node -->
    <circle cx="0" cy="0" r="20" fill="url(#futureGrad)" filter="url(#nodeShadow)"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#3a4560" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#3a4560"/>
    
    <!-- Info Card (Bottom) -->
    <g transform="translate(0, 45)">
      <rect x="-55" y="0" width="110" height="55" rx="8" fill="rgba(30,40,70,0.1)" stroke="#3a4560" stroke-width="1" filter="url(#nodeShadow)"/>
      <rect x="-55" y="0" width="110" height="4" fill="#3a4560" opacity="0.8" rx="2"/>
      <text x="0" y="20" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle" font-weight="700">CERT &amp; CERTS</text>
      <text x="0" y="35" font-family="'Segoe UI', sans-serif" font-size="8" fill="#71717a" text-anchor="middle">CEH · OSCP</text>
      <text x="0" y="47" font-family="'Segoe UI', sans-serif" font-size="8" fill="#71717a" text-anchor="middle">CompTIA+</text>
    </g>
    
    <!-- Year -->
    <text x="0" y="-30" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle" font-weight="700">2025 Q3</text>
  </g>

  <!-- === NODE 6: AI SEC ANALYST (FUTURE) === -->
  <g transform="translate(800, 145)">
    <!-- Node -->
    <circle cx="0" cy="0" r="20" fill="url(#futureGrad)" filter="url(#nodeShadow)"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#3a4560" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#3a4560"/>
    
    <!-- Info Card (Top) -->
    <g transform="translate(0, -95)">
      <rect x="-55" y="0" width="110" height="55" rx="8" fill="rgba(30,40,70,0.1)" stroke="#3a4560" stroke-width="1" filter="url(#nodeShadow)"/>
      <rect x="-55" y="51" width="110" height="4" fill="#3a4560" opacity="0.8" rx="2"/>
      <text x="0" y="20" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle" font-weight="700">AI SEC ANALYST</text>
      <text x="0" y="35" font-family="'Segoe UI', sans-serif" font-size="8" fill="#71717a" text-anchor="middle">Full-Time Role</text>
      <text x="0" y="47" font-family="'Segoe UI', sans-serif" font-size="8" fill="#71717a" text-anchor="middle">AI Red Teaming</text>
    </g>
    
    <!-- Year -->
    <text x="0" y="35" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle" font-weight="700">2026+</text>
  </g>
  
  <!-- Outer glowing border -->
  <rect x="1" y="1" width="898" height="318" rx="12" fill="none" stroke="rgba(0,240,255,0.15)" stroke-width="1" pointer-events="none"/>
</svg>
