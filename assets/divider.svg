<svg width="900" height="20" viewBox="0 0 900 20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:transparent"/>
      <stop offset="15%"  style="stop-color:#00f0ff"/>
      <stop offset="40%"  style="stop-color:#bd00ff"/>
      <stop offset="60%"  style="stop-color:#00ff66"/>
      <stop offset="85%"  style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main glowing line -->
  <line x1="0" y1="10" x2="900" y2="10" stroke="url(#divGrad)" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Center diamond -->
  <polygon points="450,4 456,10 450,16 444,10"
           fill="#00f0ff" filter="url(#glow)" opacity="0.9"/>

  <!-- Left micro-dots -->
  <circle cx="380" cy="10" r="2"   fill="#bd00ff" filter="url(#glow)"/>
  <circle cx="360" cy="10" r="1.2" fill="#00f0ff" opacity="0.6"/>
  <circle cx="344" cy="10" r="0.8" fill="#00f0ff" opacity="0.35"/>

  <!-- Right micro-dots -->
  <circle cx="520" cy="10" r="2"   fill="#bd00ff" filter="url(#glow)"/>
  <circle cx="540" cy="10" r="1.2" fill="#00f0ff" opacity="0.6"/>
  <circle cx="556" cy="10" r="0.8" fill="#00f0ff" opacity="0.35"/>
</svg>
