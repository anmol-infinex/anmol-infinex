<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04080f"/>
      <stop offset="100%" style="stop-color:#060310"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#bd00ff"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.7" fill="rgba(0,240,255,0.15)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="10"/>
  <rect width="900" height="320" fill="url(#dots)" rx="10"/>

  <!-- Terminal header bar -->
  <rect x="0" y="0" width="900" height="42" rx="10" fill="#0d1117"/>
  <rect x="0" y="32" width="900" height="10" fill="#0d1117"/>

  <!-- Traffic light dots -->
  <circle cx="24" cy="21" r="7" fill="#ff5f57"/>
  <circle cx="46" cy="21" r="7" fill="#febc2e"/>
  <circle cx="68" cy="21" r="7" fill="#28c840"/>

  <!-- Terminal title -->
  <text x="450" y="27" font-family="Courier New" font-size="12" fill="#8b949e" text-anchor="middle" font-weight="600">
    anmol@infinex-terminal: ~/about_me
  </text>

  <!-- Separator line under header -->
  <line x1="0" y1="42" x2="900" y2="42" stroke="#1a2233" stroke-width="2"/>
  <line x1="0" y1="42" x2="900" y2="42" stroke="url(#headerGrad)" stroke-width="1" opacity="0.6"/>

  <!-- SECTION LABEL -->
  <text x="30" y="73" font-family="Courier New" font-size="11" fill="#00f0ff" filter="url(#glow)">┌─────────────────────────────────────────────────────────────────────────────────────────┐</text>
  <text x="30" y="91" font-family="Courier New" font-size="11" fill="#00f0ff" filter="url(#glow)">│</text>
  <text x="134" y="91" font-family="Courier New" font-size="13" fill="#00f0ff" font-weight="700" filter="url(#titleGlow)">◈  SYSTEM PROFILE — ANMOL RATHOD</text>
  <text x="858" y="91" font-family="Courier New" font-size="11" fill="#00f0ff" filter="url(#glow)">│</text>
  <text x="30" y="109" font-family="Courier New" font-size="11" fill="#00f0ff" filter="url(#glow)">└─────────────────────────────────────────────────────────────────────────────────────────┘</text>

  <!-- Line 1 -->
  <text x="30" y="135" font-family="Courier New" font-size="12.5" fill="#bd00ff" filter="url(#glow)">$</text>
  <text x="48" y="135" font-family="Courier New" font-size="12.5" fill="#8b949e">cat /etc/profile.d/anmol.conf</text>

  <!-- Line 2: Name -->
  <text x="30" y="158" font-family="Courier New" font-size="12" fill="#00ff66">OPERATOR</text>
  <text x="130" y="158" font-family="Courier New" font-size="12" fill="#8b949e">=</text>
  <text x="148" y="158" font-family="Courier New" font-size="12" fill="#ffffff" font-weight="600">"Anmol Rathod"</text>

  <!-- Line 3: Role -->
  <text x="30" y="178" font-family="Courier New" font-size="12" fill="#00ff66">ROLE</text>
  <text x="130" y="178" font-family="Courier New" font-size="12" fill="#8b949e">=</text>
  <text x="148" y="178" font-family="Courier New" font-size="12" fill="#00f0ff">"AI Security Analyst &amp; LLM Security Researcher"</text>

  <!-- Line 4: Focus -->
  <text x="30" y="198" font-family="Courier New" font-size="12" fill="#00ff66">FOCUS</text>
  <text x="130" y="198" font-family="Courier New" font-size="12" fill="#8b949e">=</text>
  <text x="148" y="198" font-family="Courier New" font-size="12" fill="#bd00ff">"AI Security · LLM Security · Cybersecurity · OSINT"</text>

  <!-- Line 5: Status -->
  <text x="30" y="218" font-family="Courier New" font-size="12" fill="#00ff66">STATUS</text>
  <text x="130" y="218" font-family="Courier New" font-size="12" fill="#8b949e">=</text>
  <text x="148" y="218" font-family="Courier New" font-size="12" fill="#febc2e">"Actively building · Hunting AI threats · Open to collab"</text>

  <!-- Line 6: Location -->
  <text x="30" y="238" font-family="Courier New" font-size="12" fill="#00ff66">LOCATION</text>
  <text x="130" y="238" font-family="Courier New" font-size="12" fill="#8b949e">=</text>
  <text x="148" y="238" font-family="Courier New" font-size="12" fill="#ffffff">"India 🇮🇳 · GMT+5:30"</text>

  <!-- Line 7: Contact -->
  <text x="30" y="258" font-family="Courier New" font-size="12" fill="#00ff66">CONTACT</text>
  <text x="130" y="258" font-family="Courier New" font-size="12" fill="#8b949e">=</text>
  <text x="148" y="258" font-family="Courier New" font-size="12" fill="#00f0ff">"anmolrathod15007@gmail.com"</text>

  <!-- Blinking cursor line -->
  <text x="30" y="285" font-family="Courier New" font-size="12.5" fill="#00f0ff" filter="url(#glow)">$</text>
  <text x="48" y="285" font-family="Courier New" font-size="12.5" fill="#8b949e">_</text>
  <rect x="54" y="272" width="9" height="16" fill="#00f0ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Right panel: Live indicator -->
  <circle cx="855" cy="72" r="5" fill="#00ff66" filter="url(#glow)">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="840" y="77" font-family="Courier New" font-size="9" fill="#00ff66" text-anchor="end">LIVE</text>

  <!-- Right panel: Progress bars for skills -->
  <text x="640" y="140" font-family="Courier New" font-size="9" fill="#8b949e">AI SECURITY</text>
  <rect x="730" y="128" width="145" height="8" rx="4" fill="#1a2233"/>
  <rect x="730" y="128" width="130" height="8" rx="4" fill="url(#headerGrad)" opacity="0.8"/>
  <text x="880" y="138" font-family="Courier New" font-size="9" fill="#00f0ff">90%</text>

  <text x="640" y="160" font-family="Courier New" font-size="9" fill="#8b949e">LLM SECURITY</text>
  <rect x="730" y="148" width="145" height="8" rx="4" fill="#1a2233"/>
  <rect x="730" y="148" width="115" height="8" rx="4" fill="#bd00ff" opacity="0.8"/>
  <text x="880" y="158" font-family="Courier New" font-size="9" fill="#bd00ff">80%</text>

  <text x="640" y="180" font-family="Courier New" font-size="9" fill="#8b949e">PENTESTING</text>
  <rect x="730" y="168" width="145" height="8" rx="4" fill="#1a2233"/>
  <rect x="730" y="168" width="105" height="8" rx="4" fill="#00ff66" opacity="0.8"/>
  <text x="880" y="178" font-family="Courier New" font-size="9" fill="#00ff66">72%</text>

  <text x="640" y="200" font-family="Courier New" font-size="9" fill="#8b949e">PYTHON DEV</text>
  <rect x="730" y="188" width="145" height="8" rx="4" fill="#1a2233"/>
  <rect x="730" y="188" width="120" height="8" rx="4" fill="#febc2e" opacity="0.8"/>
  <text x="880" y="198" font-family="Courier New" font-size="9" fill="#febc2e">83%</text>

  <text x="640" y="220" font-family="Courier New" font-size="9" fill="#8b949e">OSINT</text>
  <rect x="730" y="208" width="145" height="8" rx="4" fill="#1a2233"/>
  <rect x="730" y="208" width="110" height="8" rx="4" fill="#ff5f57" opacity="0.8"/>
  <text x="880" y="218" font-family="Courier New" font-size="9" fill="#ff5f57">76%</text>

  <!-- Vertical separator -->
  <line x1="620" y1="120" x2="620" y2="270" stroke="#1a2233" stroke-width="1"/>

  <!-- Border -->
  <rect width="900" height="320" fill="none" stroke="#1a2233" stroke-width="2" rx="10"/>
  <rect width="900" height="320" fill="none" stroke="url(#headerGrad)" stroke-width="1" rx="10" opacity="0.3"/>
</svg>
