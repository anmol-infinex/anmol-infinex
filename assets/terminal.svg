<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .terminal-window {
        fill: #06070b;
        stroke: #1a2233;
        stroke-width: 1.5;
      }
      
      .terminal-header {
        fill: #0d111b;
        stroke: #1a2233;
        stroke-width: 1.5;
      }
      
      .window-title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        fill: #8f9bb3;
        letter-spacing: 1px;
      }
      
      .line-num {
        font-family: 'Fira Code', monospace;
        font-size: 12px;
        fill: #2e3b52;
        text-anchor: end;
        user-select: none;
      }
      
      .term-text {
        font-family: 'Fira Code', monospace;
        font-size: 13px;
        fill: #ffffff;
      }
      
      .prompt {
        fill: #00f0ff;
        font-weight: 600;
      }
      
      .cmd {
        fill: #00ff66;
        font-weight: 600;
      }
      
      .val-name {
        fill: #ffffff;
        font-weight: 600;
        filter: drop-shadow(0 0 3px rgba(255,255,255,0.3));
      }
      
      .val-purple {
        fill: #bd00ff;
        font-weight: 600;
      }
      
      .val-blue {
        fill: #00a8ff;
      }
      
      .val-comment {
        fill: #4b5b75;
        font-style: italic;
      }
      
      .cursor {
        fill: #00ff66;
        animation: blink 1s step-end infinite;
      }
      
      .telemetry-title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px;
        fill: #bd00ff;
        letter-spacing: 2px;
        font-weight: bold;
      }
      
      .telemetry-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #8f9bb3;
      }
      
      .telemetry-val {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #00ff66;
      }
      
      .wave-line {
        stroke: #00f0ff;
        stroke-width: 1.5;
        fill: none;
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: draw-wave 4s linear infinite;
        filter: drop-shadow(0 0 4px rgba(0, 240, 255, 0.5));
      }
      
      .status-light {
        animation: pulse-light 2s infinite ease-in-out;
      }
      
      @keyframes blink {
        from, to { opacity: 0; }
        50% { opacity: 1; }
      }
      
      @keyframes draw-wave {
        to { stroke-dashoffset: 0; }
      }
      
      @keyframes pulse-light {
        0%, 100% { fill: #00ff66; opacity: 0.4; filter: drop-shadow(0 0 1px rgba(0,255,102,0.2)); }
        50% { fill: #00ff66; opacity: 1; filter: drop-shadow(0 0 6px rgba(0,255,102,0.8)); }
      }
      
      .progress-bar-bg {
        fill: #141923;
        rx: 2;
      }
      .progress-bar-fill-cyan {
        fill: #00f0ff;
        rx: 2;
        filter: drop-shadow(0 0 2px rgba(0,240,255,0.4));
      }
      .progress-bar-fill-purple {
        fill: #bd00ff;
        rx: 2;
        filter: drop-shadow(0 0 2px rgba(189,0,255,0.4));
      }
    </style>
  </defs>

  <!-- Terminal Window Shadow/Glow -->
  <rect x="5" y="5" width="790" height="360" rx="8" fill="rgba(0, 240, 255, 0.03)" stroke="#00f0ff" stroke-opacity="0.15" stroke-width="3" />
  
  <!-- Terminal Window Background -->
  <rect x="10" y="10" width="780" height="350" rx="6" class="terminal-window" />
  
  <!-- Terminal Header Bar -->
  <path d="M 10 16 A 6 6 0 0 1 16 10 L 784 10 A 6 6 0 0 1 790 16 L 790 40 L 10 40 Z" class="terminal-header" />
  
  <!-- Window Controls (Dots) -->
  <circle cx="30" cy="25" r="6" fill="#ff5f56" />
  <circle cx="50" cy="25" r="6" fill="#ffbd2e" />
  <circle cx="70" cy="25" r="6" fill="#27c93f" />
  
  <!-- Terminal Header Title -->
  <text x="400" y="29" class="window-title" text-anchor="middle">terminal - anmol@infinex: ~</text>
  <path d="M 755 20 L 770 20 M 755 25 L 770 25 M 755 30 L 770 30" stroke="#4b5b75" stroke-width="1.5" />

  <!-- Code Line Numbers -->
  <g class="line-num" transform="translate(45, 0)">
    <text x="0" y="70">01</text>
    <text x="0" y="95">02</text>
    <text x="0" y="120">03</text>
    <text x="0" y="145">04</text>
    <text x="0" y="170">05</text>
    <text x="0" y="195">06</text>
    <text x="0" y="220">07</text>
    <text x="0" y="245">08</text>
    <text x="0" y="270">09</text>
    <text x="0" y="295">10</text>
    <text x="0" y="320">11</text>
    <text x="0" y="345">12</text>
  </g>

  <!-- Divider Line Between Terminal Code and Right Panel -->
  <line x1="510" y1="40" x2="510" y2="360" stroke="#161c28" stroke-width="1" />
  <!-- Accent Tech Notch on Divider -->
  <path d="M 510 180 L 518 190 L 518 210 L 510 220" fill="none" stroke="#bd00ff" stroke-width="1.5" />

  <!-- Left Side: Terminal Code Content -->
  <g transform="translate(65, 0)">
    <!-- Line 1: whoami -->
    <text x="0" y="70" class="term-text"><tspan class="prompt">$ </tspan><tspan class="cmd">whoami</tspan></text>
    
    <!-- Line 2: ANMOL RATHOD -->
    <text x="0" y="95" class="term-text val-name">ANMOL RATHOD</text>
    
    <!-- Line 3: role -->
    <text x="0" y="120" class="term-text"><tspan class="prompt">$ </tspan><tspan class="cmd">role</tspan></text>
    
    <!-- Line 4: AI Security Builder -->
    <text x="0" y="145" class="term-text val-purple">AI Security Builder</text>
    
    <!-- Line 5: mission -->
    <text x="0" y="170" class="term-text"><tspan class="prompt">$ </tspan><tspan class="cmd">mission</tspan></text>
    
    <!-- Line 6: Build LLM Security tools -->
    <text x="0" y="195" class="term-text val-blue">Build LLM Security tools &amp; Secure AI systems.</text>
    
    <!-- Line 7: focus -->
    <text x="0" y="220" class="term-text"><tspan class="prompt">$ </tspan><tspan class="cmd">focus</tspan></text>
    
    <!-- Line 8: Focus items -->
    <text x="0" y="245" class="term-text"><tspan class="val-blue">[ </tspan>Generative AI<tspan class="val-comment">, </tspan>Agentic AI<tspan class="val-comment">, </tspan>Secure AI<tspan class="val-blue"> ]</tspan></text>
    <text x="0" y="270" class="term-text"><tspan class="val-blue">[ </tspan>Cybersecurity<tspan class="val-comment">, </tspan>Linux<tspan class="val-comment">, </tspan>Networking<tspan class="val-blue"> ]</tspan></text>
    
    <!-- Line 10: goal -->
    <text x="0" y="295" class="term-text"><tspan class="prompt">$ </tspan><tspan class="cmd">goal</tspan></text>
    
    <!-- Line 11: Become an AI Security Analyst. -->
    <text x="0" y="320" class="term-text val-name">Become an AI Security Analyst.<tspan class="cursor">█</tspan></text>
    
    <!-- Line 12: Empty prompt -->
    <text x="0" y="345" class="term-text"><tspan class="prompt">$ </tspan></text>
  </g>

  <!-- Right Side: System Telemetry & HUD -->
  <g transform="translate(530, 0)">
    <!-- Panel Title -->
    <text x="0" y="70" class="telemetry-title">// DIAGNOSTICS</text>
    <line x1="0" y1="78" x2="240" y2="78" stroke="#bd00ff" stroke-width="1.5" />
    
    <!-- Status Grid -->
    <text x="0" y="105" class="telemetry-label">SECURE ENCLAVE</text>
    <text x="140" y="105" class="telemetry-val">ACTIVE</text>
    <circle cx="230" cy="101" r="4.5" class="status-light" />
    
    <!-- Progress CPU usage -->
    <text x="0" y="130" class="telemetry-label">LLM SEC SHIELD</text>
    <text x="140" y="130" class="telemetry-val">ON (92%)</text>
    <rect x="0" y="138" width="230" height="6" class="progress-bar-bg" />
    <rect x="0" y="138" width="211" height="6" class="progress-bar-fill-cyan" />
    
    <!-- Progress Threat Level -->
    <text x="0" y="165" class="telemetry-label">SYS THREAT INDEX</text>
    <text x="140" y="165" class="telemetry-val" style="fill: #00f0ff;">0.00%</text>
    <rect x="0" y="173" width="230" height="6" class="progress-bar-bg" />
    <rect x="0" y="173" width="5" height="6" class="progress-bar-fill-purple" />
    
    <!-- Network Matrix / Wave -->
    <text x="0" y="205" class="telemetry-label">SECURE SANDBOX TELEMETRY</text>
    
    <rect x="0" y="215" width="230" height="75" fill="#040507" stroke="#141923" stroke-width="1" rx="4" />
    <!-- Oscilloscope Grid inside container -->
    <g stroke="#0c0f18" stroke-width="0.5">
      <line x1="0" y1="233" x2="230" y2="233" />
      <line x1="0" y1="252" x2="230" y2="252" />
      <line x1="0" y1="271" x2="230" y2="271" />
      <line x1="38" y1="215" x2="38" y2="290" />
      <line x1="76" y1="215" x2="76" y2="290" />
      <line x1="114" y1="215" x2="114" y2="290" />
      <line x1="152" y1="215" x2="152" y2="290" />
      <line x1="190" y1="215" x2="190" y2="290" />
    </g>
    
    <!-- Waveform Path -->
    <path class="wave-line" d="M 5,252 Q 25,225 45,252 T 85,252 T 125,275 T 165,230 T 205,252 L 225,252" />
    
    <!-- Digital Decoders -->
    <text x="5" y="315" class="mono-text" style="font-size: 8px; fill: #00ff66;">AUDIT: OK</text>
    <text x="75" y="315" class="mono-text" style="font-size: 8px; fill: #00f0ff;">SANDBOX: SECURE</text>
    <text x="160" y="315" class="mono-text" style="font-size: 8px; fill: #bd00ff; text-anchor: end;">AGENT_STABLE</text>
    
    <text x="0" y="340" class="mono-text" style="font-size: 9px; fill: #4b5b75;">IP_ADDR: [2001:0db8:85a3:0000:0000:8a2e:0370:7334]</text>
  </g>
</svg>
