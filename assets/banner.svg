<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00000f"/>
      <stop offset="40%" style="stop-color:#040612"/>
      <stop offset="100%" style="stop-color:#0a0018"/>
    </linearGradient>
    <!-- Cyan neon glow filter -->
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Purple neon glow filter -->
    <filter id="purpleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Green glow filter -->
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,240,255,0.03)"/>
      <rect y="2" width="1" height="1" fill="rgba(0,0,0,0.1)"/>
    </pattern>
    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,240,255,0.06)" stroke-width="0.5"/>
    </pattern>
    <!-- Corner bracket gradient -->
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#bd00ff"/>
    </linearGradient>
    <!-- Title text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="45%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#bd00ff"/>
    </linearGradient>
    <!-- Horizontal line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="20%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#bd00ff"/>
      <stop offset="80%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)" rx="8"/>
  <rect width="900" height="280" fill="url(#grid)" rx="8" opacity="0.7"/>
  <rect width="900" height="280" fill="url(#scanlines)" rx="8"/>

  <!-- Animated matrix rain columns -->
  <g font-family="Courier New" font-size="11" fill="#00f0ff" opacity="0.12">
    <text x="18" y="0"><animate attributeName="y" values="0;280" dur="3.1s" repeatCount="indefinite"/>0110</text>
    <text x="60" y="-80"><animate attributeName="y" values="-80;280" dur="2.7s" repeatCount="indefinite"/>1001</text>
    <text x="120" y="-30"><animate attributeName="y" values="-30;280" dur="4.2s" repeatCount="indefinite"/>0101</text>
    <text x="180" y="-120"><animate attributeName="y" values="-120;280" dur="3.8s" repeatCount="indefinite"/>1100</text>
    <text x="240" y="0"><animate attributeName="y" values="0;280" dur="2.5s" repeatCount="indefinite"/>0011</text>
    <text x="300" y="-60"><animate attributeName="y" values="-60;280" dur="3.5s" repeatCount="indefinite"/>1010</text>
    <text x="360" y="-100"><animate attributeName="y" values="-100;280" dur="4.0s" repeatCount="indefinite"/>0110</text>
    <text x="660" y="-40"><animate attributeName="y" values="-40;280" dur="3.3s" repeatCount="indefinite"/>1001</text>
    <text x="720" y="-90"><animate attributeName="y" values="-90;280" dur="2.9s" repeatCount="indefinite"/>0100</text>
    <text x="780" y="-20"><animate attributeName="y" values="-20;280" dur="3.7s" repeatCount="indefinite"/>1110</text>
    <text x="840" y="-60"><animate attributeName="y" values="-60;280" dur="4.1s" repeatCount="indefinite"/>0011</text>
  </g>

  <!-- Ambient glowing orbs -->
  <circle cx="150" cy="140" r="70" fill="rgba(0,240,255,0.04)">
    <animate attributeName="r" values="70;90;70" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.04;0.08;0.04" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="140" r="80" fill="rgba(189,0,255,0.04)">
    <animate attributeName="r" values="80;100;80" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.04;0.08;0.04" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="240" r="50" fill="rgba(0,255,102,0.03)">
    <animate attributeName="r" values="50;70;50" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Top decorative line -->
  <line x1="50" y1="22" x2="850" y2="22" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.8"/>

  <!-- Corner brackets — top left -->
  <path d="M 20 8 L 20 45 M 20 8 L 60 8" stroke="url(#bracketGrad)" stroke-width="2.5" fill="none" filter="url(#cyanGlow)"/>
  <!-- Corner brackets — top right -->
  <path d="M 880 8 L 880 45 M 880 8 L 840 8" stroke="url(#bracketGrad)" stroke-width="2.5" fill="none" filter="url(#cyanGlow)"/>
  <!-- Corner brackets — bottom left -->
  <path d="M 20 272 L 20 235 M 20 272 L 60 272" stroke="url(#bracketGrad)" stroke-width="2.5" fill="none" filter="url(#cyanGlow)"/>
  <!-- Corner brackets — bottom right -->
  <path d="M 880 272 L 880 235 M 880 272 L 840 272" stroke="url(#bracketGrad)" stroke-width="2.5" fill="none" filter="url(#cyanGlow)"/>

  <!-- Top status bar dots -->
  <circle cx="36" cy="14" r="3.5" fill="#00ff66"><animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="52" cy="14" r="3.5" fill="#ffcc00"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="68" cy="14" r="3.5" fill="#ff3366"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
  <text x="86" y="19" font-family="Courier New" font-size="9" fill="#00f0ff" opacity="0.6">SYSTEM://ONLINE</text>

  <!-- NODE_ID top right -->
  <text x="750" y="19" font-family="Courier New" font-size="9" fill="#bd00ff" opacity="0.7">ID::AR-SEC-∞</text>

  <!-- Main name text - huge and centered -->
  <text x="450" y="118" font-family="'Trebuchet MS', Arial, sans-serif" font-size="58" font-weight="900"
        fill="url(#titleGrad)" text-anchor="middle" letter-spacing="10" filter="url(#cyanGlow)">
    ANMOL RATHOD
  </text>

  <!-- Glitch effect layer 1 -->
  <text x="450" y="118" font-family="'Trebuchet MS', Arial, sans-serif" font-size="58" font-weight="900"
        fill="rgba(0,240,255,0.3)" text-anchor="middle" letter-spacing="10" opacity="0">
    ANMOL RATHOD
    <animate attributeName="opacity" values="0;0;0;0.6;0;0;0;0;0.4;0;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="450;452;448;450;450;450;450;452;450;450" dur="4s" repeatCount="indefinite"/>
  </text>
  <!-- Glitch effect layer 2 -->
  <text x="450" y="118" font-family="'Trebuchet MS', Arial, sans-serif" font-size="58" font-weight="900"
        fill="rgba(189,0,255,0.3)" text-anchor="middle" letter-spacing="10" opacity="0">
    ANMOL RATHOD
    <animate attributeName="opacity" values="0;0;0;0;0.5;0;0;0;0;0.3;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="450;448;452;450;450;450;449;450;451;450" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle separator line -->
  <line x1="180" y1="136" x2="370" y2="136" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
  <circle cx="450" cy="136" r="4" fill="#00f0ff" filter="url(#cyanGlow)">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <line x1="530" y1="136" x2="720" y2="136" stroke="#bd00ff" stroke-width="1" opacity="0.5"/>

  <!-- Role tags -->
  <text x="450" y="168" font-family="'Courier New', monospace" font-size="15" font-weight="700"
        fill="#00f0ff" text-anchor="middle" letter-spacing="4" filter="url(#greenGlow)">
    AI SECURITY · LLM SECURITY · CYBERSECURITY
  </text>

  <!-- Status tags -->
  <rect x="195" y="195" width="130" height="24" rx="12" fill="rgba(0,240,255,0.08)" stroke="#00f0ff" stroke-width="1" opacity="0.9"/>
  <text x="260" y="212" font-family="Courier New" font-size="10" fill="#00f0ff" text-anchor="middle" font-weight="700">⚡ BUILDER</text>

  <rect x="340" y="195" width="130" height="24" rx="12" fill="rgba(189,0,255,0.08)" stroke="#bd00ff" stroke-width="1" opacity="0.9"/>
  <text x="405" y="212" font-family="Courier New" font-size="10" fill="#bd00ff" text-anchor="middle" font-weight="700">🛡️ DEFENDER</text>

  <rect x="485" y="195" width="130" height="24" rx="12" fill="rgba(0,255,102,0.08)" stroke="#00ff66" stroke-width="1" opacity="0.9"/>
  <text x="550" y="212" font-family="Courier New" font-size="10" fill="#00ff66" text-anchor="middle" font-weight="700">🔬 RESEARCHER</text>

  <!-- Bottom decorative line -->
  <line x1="50" y1="248" x2="850" y2="248" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.8"/>

  <!-- Bottom status bar -->
  <text x="450" y="268" font-family="Courier New" font-size="9" fill="#00f0ff" text-anchor="middle" opacity="0.5">
    [ STATUS: ACTIVE ] · [ MISSION: AI_SECURITY_ANALYST ] · [ THREAT_LVL: HUNTING ]
  </text>

  <!-- Border glow -->
  <rect width="900" height="280" fill="none" stroke="url(#bracketGrad)" stroke-width="1.5" rx="8" opacity="0.4"/>
</svg>
