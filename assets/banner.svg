<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        fill: #00f0ff;
        font-size: 42px;
        letter-spacing: 5px;
        filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.6));
        animation: glitch 4s infinite alternate;
      }
      
      .subtitle {
        font-family: 'Orbitron', sans-serif;
        font-weight: 500;
        fill: #bd00ff;
        font-size: 16px;
        letter-spacing: 6px;
        filter: drop-shadow(0 0 5px rgba(189, 0, 255, 0.5));
      }
      
      .mono-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #00ff66;
        opacity: 0.8;
      }
      
      .accent-text {
        fill: #bd00ff;
      }
      
      .grid-lines {
        stroke: #141923;
        stroke-width: 1;
      }
      
      .grid-accent {
        stroke: #00f0ff;
        stroke-width: 1.5;
        opacity: 0.3;
        animation: pulse-grid 3s infinite ease-in-out;
      }
      
      .scanner-line {
        stroke: #00f0ff;
        stroke-width: 1;
        opacity: 0.5;
        animation: scan 8s infinite linear;
      }
      
      .glow-ring {
        transform-origin: 750px 130px;
        animation: rotate-ring 20s infinite linear;
      }
      
      /* Animations */
      @keyframes glitch {
        0%, 100% {
          transform: translate(0);
          text-shadow: 0 0 8px rgba(0,240,255,0.6);
        }
        92% {
          transform: translate(0);
          text-shadow: 0 0 8px rgba(0,240,255,0.6);
        }
        94% {
          transform: translate(-2px, 1px);
          text-shadow: -2px 0 red, 2px 0 blue;
        }
        96% {
          transform: translate(2px, -1px);
          text-shadow: -2px 0 blue, 2px 0 red;
        }
        98% {
          transform: translate(-1px, -1px);
          text-shadow: -1px 0 #00ff66, 1px 0 #bd00ff;
        }
      }
      
      @keyframes scan {
        0% { y1: 10px; y2: 10px; }
        50% { y1: 250px; y2: 250px; }
        100% { y1: 10px; y2: 10px; }
      }
      
      @keyframes pulse-grid {
        0%, 100% { opacity: 0.1; }
        50% { opacity: 0.4; }
      }
      
      @keyframes rotate-ring {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse-dot {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }
      
      .status-dot {
        animation: pulse-dot 1.5s infinite ease-in-out;
      }
    </style>
    
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508" />
      <stop offset="50%" stop-color="#090a12" />
      <stop offset="100%" stop-color="#020204" />
    </linearGradient>
    
    <linearGradient id="panel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d111b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#07090e" stop-opacity="0.9" />
    </linearGradient>
    
    <!-- Neon blue glow filter -->
    <filter id="glow-cyan-f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="850" height="260" rx="10" fill="url(#bg-grad)" stroke="#1a2233" stroke-width="1.5" />
  
  <!-- Digital Grid Pattern -->
  <g class="grid-lines">
    <!-- Vertical lines -->
    <line x1="50" y1="10" x2="50" y2="250" />
    <line x1="100" y1="10" x2="100" y2="250" />
    <line x1="150" y1="10" x2="150" y2="250" />
    <line x1="200" y1="10" x2="200" y2="250" />
    <line x1="250" y1="10" x2="250" y2="250" />
    <line x1="300" y1="10" x2="300" y2="250" />
    <line x1="350" y1="10" x2="350" y2="250" />
    <line x1="400" y1="10" x2="400" y2="250" />
    <line x1="450" y1="10" x2="450" y2="250" />
    <line x1="500" y1="10" x2="500" y2="250" />
    <line x1="550" y1="10" x2="550" y2="250" />
    <line x1="600" y1="10" x2="600" y2="250" />
    <line x1="650" y1="10" x2="650" y2="250" />
    <line x1="700" y1="10" x2="700" y2="250" />
    <line x1="750" y1="10" x2="750" y2="250" />
    <line x1="800" y1="10" x2="800" y2="250" />
    
    <!-- Horizontal lines -->
    <line x1="10" y1="40" x2="840" y2="40" />
    <line x1="10" y1="80" x2="840" y2="80" />
    <line x1="10" y1="120" x2="840" y2="120" />
    <line x1="10" y1="160" x2="840" y2="160" />
    <line x1="10" y1="200" x2="840" y2="200" />
    <line x1="10" y1="240" x2="840" y2="240" />
  </g>
  
  <!-- Glowing accent lines -->
  <line x1="10" y1="120" x2="840" y2="120" class="grid-accent" />
  <line x1="450" y1="10" x2="450" y2="250" class="grid-accent" />

  <!-- Animated Scanline -->
  <line x1="10" y1="10" x2="840" y2="10" class="scanner-line" />
  
  <!-- Cyber HUD Border Brackets -->
  <path d="M 25 15 L 15 15 L 15 25" fill="none" stroke="#00f0ff" stroke-width="2.5" />
  <path d="M 825 15 L 835 15 L 835 25" fill="none" stroke="#00f0ff" stroke-width="2.5" />
  <path d="M 25 245 L 15 245 L 15 235" fill="none" stroke="#00f0ff" stroke-width="2.5" />
  <path d="M 825 245 L 835 245 L 835 235" fill="none" stroke="#00f0ff" stroke-width="2.5" />

  <!-- Technical Overlay Details -->
  <!-- Top Left Info Panel -->
  <rect x="30" y="25" width="220" height="40" fill="url(#panel-grad)" stroke="#1a2233" stroke-width="1" rx="3" />
  <text x="40" y="40" class="mono-text">SYSTEM: <tspan fill="#ffffff">ONLINE</tspan></text>
  <text x="40" y="55" class="mono-text">SEC_LEVEL: <tspan class="accent-text">MAXIMUM_AI</tspan></text>
  <circle cx="230" cy="45" r="5" fill="#00ff66" class="status-dot" filter="url(#glow-cyan-f)" />
  
  <!-- Bottom Left Telemetry -->
  <text x="30" y="225" class="mono-text">LOC: <tspan fill="#ffffff">0x7F / 127.0.0.1</tspan></text>
  <text x="30" y="240" class="mono-text">PROTOCOL: <tspan fill="#00f0ff">SECURE_AGENT_v2.6</tspan></text>

  <!-- Circular Target HUD graphics on the right side -->
  <g class="glow-ring">
    <circle cx="750" cy="130" r="80" fill="none" stroke="#121824" stroke-width="1.5" />
    <circle cx="750" cy="130" r="70" fill="none" stroke="#bd00ff" stroke-dasharray="10, 8, 4, 8" stroke-width="1" opacity="0.6" />
    <circle cx="750" cy="130" r="60" fill="none" stroke="#00f0ff" stroke-dasharray="180, 40, 90, 50" stroke-width="1.5" opacity="0.7" />
    <circle cx="750" cy="130" r="50" fill="none" stroke="#141c2c" stroke-width="1" />
    <path d="M 750 65 L 750 75 M 750 185 L 750 195 M 685 130 L 695 130 M 805 130 L 815 130" stroke="#00f0ff" stroke-width="1.5" opacity="0.8" />
  </g>
  <circle cx="750" cy="130" r="6" fill="#00f0ff" filter="url(#glow-cyan-f)" />
  <line x1="720" y1="130" x2="780" y2="130" stroke="#00f0ff" stroke-width="1" opacity="0.5" />
  <line x1="750" y1="100" x2="750" y2="160" stroke="#00f0ff" stroke-width="1" opacity="0.5" />

  <!-- Center Text Panel -->
  <g transform="translate(180, 110)">
    <!-- Tech brackets styling behind name -->
    <path d="M -15 -25 L -5 -25 M -15 -25 L -15 45 M -15 45 L -5 45" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5" />
    <path d="M 465 -25 L 455 -25 M 465 -25 L 465 45 M 465 45 L 455 45" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5" />
    
    <text x="0" y="15" class="title">ANMOL RATHOD</text>
    <text x="5" y="42" class="subtitle">AI SECURITY // CYBERSECURITY</text>
  </g>

  <!-- Telemetry detail accents -->
  <path d="M 500 25 L 530 25 L 540 35 L 630 35" fill="none" stroke="#1c2538" stroke-width="1" />
  <rect x="635" y="32" width="6" height="6" fill="#bd00ff" opacity="0.7" />
  <text x="545" y="30" class="mono-text" style="font-size: 8px; fill: #1c2538;">CORE_INTEL_LOAD_OK</text>
  
  <text x="815" y="240" class="mono-text" style="text-anchor: end; fill: #bd00ff;">SYS_VER_4.98c</text>
</svg>
